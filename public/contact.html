<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>
</head>
<body>
  <!-- This form is purely for Netlify's build bots to parse the form structure. -->
  <!-- It matches the form in ContactForm.tsx exactly. -->
  <form name="contact" data-netlify="true" hidden>
    <input type="text" name="name" />
    <input type="text" name="company" />
    <input type="email" name="email" />
    <textarea name="message"></textarea>
  </form>
</body>
</html>
